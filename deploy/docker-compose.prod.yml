services:
  postgres:
    image: postgres:16
    container_name: bee-task-postgres
    restart: unless-stopped

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-beetask}

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ${BACKEND_IMAGE}
    restart: unless-stopped

    environment:
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_URL: ${DB_URL}
      MP_JWT_VERIFY_ISSUER: ${MP_JWT_VERIFY_ISSUER}
      SMALLRYE_JWT_SIGN_KEY: ${SMALLRYE_JWT_SIGN_KEY}
      MP_JWT_VERIFY_PUBLICKEY: ${MP_JWT_VERIFY_PUBLICKEY}

    depends_on:
      postgres:
        condition: service_healthy

    labels:
      - "traefik.enable=true"

      # domínio
      - "traefik.http.routers.backend.rule=PathPrefix(`/backend`)"
      # HTTPS
      - "traefik.http.routers.backend.entrypoints=websecure"
      - "traefik.http.routers.backend.tls.certresolver=letsencrypt"

      # porta interna container
      - "traefik.http.services.backend.loadbalancer.server.port=8081"

  frontend:
    image: ${FRONTEND_IMAGE}
    restart: unless-stopped

    labels:
      - "traefik.enable=true"

      - "traefik.http.routers.frontend.rule=PathPrefix(`/frontend`)"

      - "traefik.http.routers.frontend.entrypoints=websecure"
      - "traefik.http.routers.frontend.tls.certresolver=letsencrypt"

      - "traefik.http.services.frontend.loadbalancer.server.port=3000"

volumes:
  postgres_data:

