services:
  postgres:
    image: postgres:18.3
    container_name: bee-task-postgres
    environment:
      POSTGRES_USER: beetask
      POSTGRES_PASSWORD: beetask
      POSTGRES_DB: beetask
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U beetask"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
