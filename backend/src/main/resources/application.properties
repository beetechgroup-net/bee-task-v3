quarkus.http.port=8080
quarkus.http.cors=true
quarkus.http.cors.origins=http://localhost:5173

quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USER:beetask}
quarkus.datasource.password=${DB_PASSWORD:beetask}
quarkus.datasource.jdbc.url=${DB_URL:jdbc:postgresql://localhost:5432/beetask}

quarkus.flyway.migrate-at-start=true
quarkus.hibernate-orm.schema-management.strategy=validate

# Swagger & OpenAPI
quarkus.smallrye-openapi.path=/openapi
quarkus.swagger-ui.path=/swagger
quarkus.swagger-ui.always-include=true
quarkus.smallrye-health.root-path=/status

# JWT Security
mp.jwt.verify.issuer=https://beetech.net
smallrye.jwt.sign.key.location=privateKey.pem
mp.jwt.verify.publickey.location=publicKey.pem
