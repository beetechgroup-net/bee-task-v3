quarkus.http.port=8081

quarkus.http.cors.enabled=true 
quarkus.http.cors.origins=https://task.beetech.dev 
quarkus.http.cors.methods=GET,PUT,POST,DELETE,PATCH,OPTIONS
quarkus.http.cors.exposed-headers=Content-Disposition 
quarkus.http.cors.access-control-max-age=24H 
quarkus.http.cors.access-control-allow-credentials=true 

quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USER:beetask}
quarkus.datasource.password=${DB_PASSWORD:beetask}
quarkus.datasource.jdbc.url=${DB_URL:jdbc:postgresql://localhost:5432/beetask}

quarkus.flyway.migrate-at-start=true
quarkus.hibernate-orm.schema-management.strategy=validate

# Swagger & OpenAPI
quarkus.smallrye-openapi.path=/openapi
quarkus.swagger-ui.path=/swagger
quarkus.swagger-ui.always-include=true
quarkus.smallrye-health.root-path=status

# JWT Security
mp.jwt.verify.issuer=${MP_JWT_VERIFY_ISSUER}
smallrye.jwt.sign.key=${SMALLRYE_JWT_SIGN_KEY}
mp.jwt.verify.publickey=${MP_JWT_VERIFY_PUBLICKEY}

